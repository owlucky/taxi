syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.example.proto";
option java_outer_classname = "TaskProto";

service TaskFormatter {
    rpc InitData(InitRequest) returns (InitResponse);

    rpc GetNextSubtask(Empty) returns (SubtaskResponse);

    rpc SubmitResult(ResultRequest) returns (ResultResponse);

    rpc GetFinalResult(Empty) returns (FinalResultResponse);
}

service TaskDistributor {
    rpc RequestSubtask(DistributorRequest) returns (UniversalTask);

    rpc SendTaskToWorker(TaskAssignment) returns (AssignmentResponse);

    rpc SubmitWorkerResult(UniversalResult) returns (ResultResponse);
}

message InitRequest {
    string taskKind = 1;
    bytes initPayload = 2;
}

message InitResponse {
    bool success = 1;
    string message = 2;
}

message Empty {}

message SubtaskResponse {
    bool hasTask = 1;
    int32 taskNumber = 2;
    string taskKind = 3;
    bytes taskPayload = 4;
}

message ResultRequest {
    int32 taskNumber = 1;
    string resultLabel = 2;
    int64 score = 3;
    bytes resultPayload = 4;
}

message ResultResponse {
    bool accepted = 1;
}

message FinalResultResponse {
    bool ready = 1;
    int64 bestScore = 2;
    string bestLabel = 3;
    int32 bestTaskNumber = 4;
    int32 processedResults = 5;
    int32 totalTasks = 6;
}

message DistributorRequest {
    string workerId = 1;
}

message TaskAssignment {
    string workerId = 1;
    UniversalTask task = 2;
}

message AssignmentResponse {
    bool success = 1;
    string message = 2;
}

service WorkerService {
    rpc SendTask(TaskAssignment) returns (UniversalResult);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message HeartbeatRequest {
    string workerId = 1;
}

message HeartbeatResponse {
    bool alive = 1;
    int32 tasksProcessed = 2;
}

message UniversalTask {
    bool hasTask = 1;
    int32 taskNumber = 2;
    string taskKind = 3;
    bytes taskPayload = 4;
}

message UniversalResult {
    string workerId = 1;
    int32 taskNumber = 2;
    string taskKind = 3;
    bool success = 4;
    string message = 5;
    string resultLabel = 6;
    int64 score = 7;
    bytes resultPayload = 8;
    int64 computationTimeMs = 9;
}
